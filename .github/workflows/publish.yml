name: Publish

on:
  push:
    branches:
      - 'master'
# on:
# push:
#   tags:
#     # Matches 0.1.0, 1.2.3, 2.0.0-rc.1, etc.
#     # See "TAG CONVENTION" above if you prefer tags with a "v" prefix.
#     - '*.*.*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v5 # Updated to v5

      - name: Install pnpm
        uses: pnpm/action-setup@v5 # Specifically for pnpm
        with:
          version: 9 # Or your preferred version

      - name: Set up Node.js
        uses: actions/setup-node@v5 # Updated to v5
        with:
          node-version: 'lts/*'
          cache: 'pnpm' # Changed from 'npm' to 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Release
        run: |
          [ -n "$NPM_TOKEN" ] && pnpm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"
          pnpm run release
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
